# .github/workflows/update-indices-from-pmb.yml

name: listperson-listwork-listplace update aus der PMB

# Trigger: Wann soll der Workflow ausgeführt werden?
on:
  schedule:
    # Läuft jeden Mittwoch um 3 Uhr morgens UTC
    - cron: '0 3 * * 3'
  workflow_dispatch: # Ermöglicht manuelles Auslösen über die GitHub UI

jobs:
  process_xml_files:
    runs-on: ubuntu-latest # Betriebssystem für den Runner

    steps:
      # Schritt 1: Repository-Inhalt auschecken
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Schritt 2: PMB-Listen herunterladen
      - name: Download PMB Listen
        run: |
          mkdir -p python-temp
          echo "Lade listbibl.xml herunter..."
          curl -fsSL -o python-temp/listbibl.xml https://pmb.acdh.oeaw.ac.at/media/listbibl.xml

          echo "Lade listperson.xml herunter..."
          curl -fsSL -o python-temp/listperson.xml https://pmb.acdh.oeaw.ac.at/media/listperson.xml

          echo "Lade listplace.xml herunter..."
          curl -fsSL -o python-temp/listplace.xml https://pmb.acdh.oeaw.ac.at/media/listplace.xml

          echo "Alle Listen erfolgreich heruntergeladen."
          ls -la python-temp/

      # Schritt 3: Java (benötigt für Saxon) installieren
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Schritt 4: Saxon-HE und Abhängigkeiten herunterladen
      - name: Download Saxon-HE and XML Resolver
        run: |
          SAXON_VERSION="12.4"
          SAXON_JAR_FILE="Saxon-HE-${SAXON_VERSION}.jar"
          SAXON_DOWNLOAD_URL="https://repo1.maven.org/maven2/net/sf/saxon/Saxon-HE/${SAXON_VERSION}/${SAXON_JAR_FILE}"

          echo "Lade Saxon-HE Version ${SAXON_VERSION} herunter..."
          wget -q "${SAXON_DOWNLOAD_URL}" -O "${SAXON_JAR_FILE}"
          if [ $? -ne 0 ]; then echo "Fehler beim Herunterladen von Saxon-HE."; exit 1; fi

          RESOLVER_VERSION="5.2.1"
          RESOLVER_JAR_FILE="xmlresolver-${RESOLVER_VERSION}.jar"
          RESOLVER_DOWNLOAD_URL="https://repo1.maven.org/maven2/org/xmlresolver/xmlresolver/${RESOLVER_VERSION}/${RESOLVER_JAR_FILE}"

          echo "Lade XML Resolver Version ${RESOLVER_VERSION} herunter..."
          wget -q "${RESOLVER_DOWNLOAD_URL}" -O "${RESOLVER_JAR_FILE}"
          if [ $? -ne 0 ]; then echo "Fehler beim Herunterladen des XML Resolvers."; exit 1; fi

          echo "SAXON_JAR=${SAXON_JAR_FILE}" >> $GITHUB_ENV
          echo "RESOLVER_JAR=${RESOLVER_JAR_FILE}" >> $GITHUB_ENV

      # Schritt 5: PMB-Listen mit Saxon kürzen und als Indexdateien ablegen
      - name: Verarbeite PMB-Listen mit Saxon XSLT
        id: process
        run: |
          XSLT_DIR="xslts/update-listPerson-listWork-listOrg-listPlace"
          XSLT1="${XSLT_DIR}/1_updateLists.xsl"
          XSLT2="${XSLT_DIR}/2_namespace-fix.xsl"

          SAXON_COMMAND="java -cp ./${SAXON_JAR}:./${RESOLVER_JAR} net.sf.saxon.Transform"

          if [ ! -f "$XSLT1" ]; then echo "Fehler: XSLT1 nicht gefunden unter $XSLT1"; exit 1; fi
          if [ ! -f "$XSLT2" ]; then echo "Fehler: XSLT2 nicht gefunden unter $XSLT2"; exit 1; fi
          if [ ! -f "${SAXON_JAR}" ]; then echo "Fehler: Saxon JAR (${SAXON_JAR}) nicht gefunden."; exit 1; fi
          if [ ! -f "${RESOLVER_JAR}" ]; then echo "Fehler: XML Resolver JAR (${RESOLVER_JAR}) nicht gefunden."; exit 1; fi

          # Mapping: PMB-Quelldatei  ->  Zieldatei unter indices/
          declare -a MAPPING=(
            "python-temp/listperson.xml|indices/listperson.xml"
            "python-temp/listplace.xml|indices/listplace.xml"
            "python-temp/listbibl.xml|indices/listwork.xml"
          )

          for entry in "${MAPPING[@]}"; do
            SRC="${entry%%|*}"
            DEST="${entry##*|}"
            TMP="${DEST}.tmp"

            if [ ! -f "$SRC" ]; then
              echo "Fehler: PMB-Quelldatei $SRC nicht gefunden."
              exit 1
            fi

            echo "Kürze $SRC -> $DEST"

            echo "  Anwenden von $XSLT1 ..."
            ${SAXON_COMMAND} -s:"$SRC" -xsl:"$XSLT1" -o:"$TMP"
            if [ $? -ne 0 ]; then
              echo "Fehler bei der Verarbeitung von $SRC mit $XSLT1"
              rm -f "$TMP"
              exit 1
            fi

            echo "  Anwenden von $XSLT2 ..."
            ${SAXON_COMMAND} -s:"$TMP" -xsl:"$XSLT2" -o:"$DEST"
            if [ $? -ne 0 ]; then
              echo "Fehler bei der Verarbeitung von $TMP mit $XSLT2"
              rm -f "$TMP"
              exit 1
            fi

            rm -f "$TMP"
            echo "  $DEST erfolgreich aktualisiert."
          done

          git_status=$(git status --porcelain indices/listperson.xml indices/listplace.xml indices/listwork.xml)

          if [ -n "$git_status" ]; then
            echo "Änderungen in den Indexdateien gefunden. Committing..."
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add indices/listperson.xml indices/listplace.xml indices/listwork.xml
            git commit -m "Automatisches Update der XML-Indexdateien via Saxon XSLT"
            echo "indices_committed=true" >> $GITHUB_OUTPUT
          else
            echo "Keine Änderungen in den Indexdateien festgestellt."
            echo "indices_committed=false" >> $GITHUB_OUTPUT
          fi

      # Schritt 6: PMB-Listen wieder aufräumen, damit sie nicht im Repo landen
      - name: Cleanup heruntergeladene PMB-Listen
        if: always()
        run: rm -rf python-temp

      # Schritt 7: Änderungen zurück ins Repository pushen (nur wenn Änderungen committet wurden)
      - name: Push changes
        if: steps.process.outputs.indices_committed == 'true'
        run: |
          echo "Pushe Änderungen zurück ins Repository..."
          git push
